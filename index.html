<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <!-- viewport-fit=cover for iOS safe areas -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>OdotNYC AR</title>

  <!-- A-Frame + AR.js -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.7/aframe/build/aframe-ar.min.js"></script>

  <style>
    :root{
      --glass: rgba(0,0,0,.68);
      --line: rgba(255,255,255,.16);
      --txt: #fff;
      --accent: #9be7ff;

      --safeL: env(safe-area-inset-left);
      --safeR: env(safe-area-inset-right);
      --safeT: env(safe-area-inset-top);
      --safeB: env(safe-area-inset-bottom);

      --pad: 12px;

      /* JS sets this to fix “half-screen” / address-bar issues */
      --vh: 1vh;
    }

    *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html, body{
      margin:0; padding:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:#000;
      color:var(--txt);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    /* Use the “real” viewport height */
    body{
      width:100vw;
      height: calc(var(--vh) * 100);
      overflow:hidden;
      position: relative;
    }

    /* Force A-Frame scene + canvas to fill the “real” height */
    a-scene{
      position: fixed !important;
      left: 0 !important; top: 0 !important;
      width: 100vw !important;
      height: calc(var(--vh) * 100) !important;
      z-index: 0;
    }
    .a-canvas, canvas{
      position: fixed !important;
      left: 0 !important; top: 0 !important;
      width: 100vw !important;
      height: calc(var(--vh) * 100) !important;
      display:block;
    }

    /* ---------- LOADING (logo only) ---------- */
    #loading{
      position: fixed;
      inset: 0;
      z-index: 10000;
      display: grid;
      place-items: center;
      background: radial-gradient(1100px 600px at 50% 25%, rgba(255,255,255,.08), rgba(0,0,0,.96));
      padding:
        calc(var(--pad) + var(--safeT))
        calc(var(--pad) + var(--safeR))
        calc(var(--pad) + var(--safeB))
        calc(var(--pad) + var(--safeL));
    }
    .logo-only{
      width: min(240px, 66vw);
      aspect-ratio: 1 / 1;
      border-radius: 26px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.03);
      backdrop-filter: blur(10px);
      display: grid;
      place-items: center;
      overflow: hidden;
      box-shadow: 0 18px 60px rgba(0,0,0,.55);
      animation: pulse 1.3s ease-in-out infinite;
    }
    .logo-only img{
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scale(1.06);
      filter: contrast(1.08) brightness(1.05);
    }
    @keyframes pulse{
      0%,100%{ transform: translateY(0); opacity: .98; }
      50%{ transform: translateY(-2px); opacity: 1; }
    }
    @media (prefers-reduced-motion: reduce){
      .logo-only{ animation:none; }
    }

    /* ---------- HUD ---------- */
    #hud{
      position: fixed;
      left: calc(var(--pad) + var(--safeL));
      right: calc(var(--pad) + var(--safeR));
      top: calc(var(--pad) + var(--safeT));
      z-index: 9998;
      display:flex;
      gap:10px;
      justify-content: space-between;
      pointer-events:none;
    }
    .pill{
      pointer-events:auto;
      background: rgba(0,0,0,.55);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 999px;
      padding: 8px 12px;
      backdrop-filter: blur(10px);
      font-size: 13px;
      line-height: 1;
      user-select:none;
      max-width: 70vw;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    body.waiting #hud{ display:none; }

    /* ---------- INSTRUCTIONS MODAL ---------- */
    #modal{
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: none;
      place-items: end center; /* bottom sheet mobile */
      background: rgba(0,0,0,.50);
      padding:
        calc(var(--pad) + var(--safeT))
        calc(var(--pad) + var(--safeR))
        calc(var(--pad) + var(--safeB))
        calc(var(--pad) + var(--safeL));
    }
    .sheet{
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 14px 14px 12px;
      background: rgba(0,0,0,.72);
      backdrop-filter: blur(12px);
      box-shadow: 0 18px 60px rgba(0,0,0,.55);
    }
    .handle{
      width: 42px; height: 4px;
      border-radius: 999px;
      background: rgba(255,255,255,.22);
      margin: 2px auto 10px;
    }
    .sheet h2{
      margin: 0 0 8px;
      font-size: 15px;
      letter-spacing: .01em;
      font-weight: 850;
    }
    .sheet p, .sheet ol{
      margin: 0;
      font-size: 13px;
      line-height: 1.45;
      opacity: .92;
    }
    .sheet ol{ margin-top: 10px; margin-left: 18px; }
    .sheet li{ margin: 6px 0; }
    .sheet b{ color: var(--accent); font-weight: 850; }

    .actions{
      margin-top: 12px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }
    .btn{
      width: 100%;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(0,0,0,.55);
      color: var(--txt);
      border-radius: 16px;
      padding: 12px 14px;
      font-size: 14px;
      font-weight: 800;
      backdrop-filter: blur(8px);
      cursor: pointer;
      user-select: none;
    }
    .btn.primary{
      border-color: rgba(155,231,255,.45);
      background: rgba(155,231,255,.14);
    }
    .btn:active{ transform: translateY(1px); }

    /* ---------- CONTROLS (mobile-first bottom bar) ---------- */
    #controls{
      position: fixed;
      left: calc(var(--pad) + var(--safeL));
      right: calc(var(--pad) + var(--safeR));
      bottom: calc(var(--pad) + var(--safeB));
      z-index: 9998;
      display: none;
      gap: 10px;
      flex-wrap: wrap;
      pointer-events: auto;
      justify-content: center;
    }
    body.scanning #controls{ display: flex; }

    .cbtn{
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(0,0,0,.55);
      color: var(--txt);
      border-radius: 14px;
      padding: 10px 12px;
      font-size: 13px;
      font-weight: 800;
      backdrop-filter: blur(10px);
      cursor: pointer;
      user-select: none;
      min-width: 98px;
      text-align: center;
    }
    .cbtn:active{ transform: translateY(1px); }

    @media (min-width: 760px){
      #modal{ place-items: center; }
      .sheet{ width: min(520px, calc(100% - 28px)); }
      .actions{ grid-template-columns: 1fr 1fr; }
      #controls{ justify-content: flex-end; }
    }
  </style>
</head>

<body class="waiting">
  <!-- Loading screen -->
  <section id="loading" aria-hidden="true">
    <div class="logo-only">
      <img src="odotnyc-logo.png" alt="OdotNYC logo" />
    </div>
  </section>

  <!-- HUD -->
  <div id="hud">
    <div class="pill">📷 OdotNYC AR</div>
    <div class="pill" id="status">Find marker…</div>
  </div>

  <!-- Controls (shown after scanning starts) -->
  <div id="controls" aria-label="Model controls">
    <button class="cbtn" id="pitchUp" type="button">Pitch ▲</button>
    <button class="cbtn" id="pitchDown" type="button">Pitch ▼</button>
    <button class="cbtn" id="yawL" type="button">Rotate ↺</button>
    <button class="cbtn" id="yawR" type="button">Rotate ↻</button>
    <button class="cbtn" id="scaleDown" type="button">Scale −</button>
    <button class="cbtn" id="scaleUp" type="button">Scale +</button>
    <button class="cbtn" id="reset" type="button">Reset</button>
  </div>

  <!-- Instructions modal -->
  <section id="modal" role="dialog" aria-modal="true" aria-label="Scan Instructions">
    <div class="sheet">
      <div class="handle" aria-hidden="true"></div>
      <h2>Scan Instructions</h2>
      <p>When you start scanning, allow camera access if prompted.</p>
      <ol>
        <li>Point your camera at the <b>OdotNYC marker</b>.</li>
        <li>Keep it <b>flat</b> and <b>well-lit</b>.</li>
        <li>Hold steady — the <b>3D model</b> will appear.</li>
      </ol>
      <div class="actions">
        <button class="btn" id="closeModal" type="button">Not now</button>
        <button class="btn primary" id="startAR" type="button">Start scanning</button>
      </div>
    </div>
  </section>

  <!-- AR Scene -->
  <a-scene
    embedded
    vr-mode-ui="enabled:false"
    renderer="antialias:true; alpha:true; logarithmicDepthBuffer:true"
    arjs="sourceType:webcam; trackingMethod:best; debugUIEnabled:false;"
  >
    <a-entity light="type: ambient; intensity: 0.9"></a-entity>
    <a-entity light="type: directional; intensity: 0.6" position="1 2 1"></a-entity>

    <a-assets timeout="45000">
      <a-asset-item id="odotModel" src="office_005.glb"></a-asset-item>
    </a-assets>

    <a-marker
      id="marker"
      type="pattern"
      url="odotnyc.patt"
      smooth="true"
      smoothCount="8"
      smoothTolerance="0.01"
      smoothThreshold="2"
    >
      <a-entity
        id="model"
        gltf-model="#odotModel"
        position="0 0.05 0"
        rotation="-90 0 0"
        scale="0.08 0.08 0.08"
      ></a-entity>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    // --- Fix “half screen” by using real innerHeight as 100vh ---
    function setRealVH(){
      const vh = window.innerHeight * 0.01;
      document.documentElement.style.setProperty('--vh', `${vh}px`);
    }
    setRealVH();
    window.addEventListener('resize', setRealVH, { passive: true });
    window.addEventListener('orientationchange', () => setTimeout(setRealVH, 200), { passive: true });

    const loading = document.getElementById('loading');
    const modal = document.getElementById('modal');
    const statusEl = document.getElementById('status');

    const startARBtn = document.getElementById('startAR');
    const closeModalBtn = document.getElementById('closeModal');

    const markerEl = document.getElementById('marker');
    const assetItem = document.getElementById('odotModel');
    const modelEl = document.getElementById('model');

    let modelReady = false;
    let scanningEnabled = false;

    // Model transform controls
    const base = { rx: -90, ry: 0, rz: 0, scale: 0.08, y: 0.05 };
    let pitch = 0;  // +/- adjusts X
    let yaw = 0;    // +/- adjusts Y
    let scl = base.scale;

    function clamp(v, min, max){ return Math.max(min, Math.min(max, v)); }

    function applyTransform(){
      const rx = base.rx + pitch;
      const ry = base.ry + yaw;
      modelEl.setAttribute('rotation', `${rx} ${ry} ${base.rz}`);
      modelEl.setAttribute('scale', `${scl} ${scl} ${scl}`);
      modelEl.setAttribute('position', `0 ${base.y} 0`);
    }
    applyTransform();

    // Splash: exactly 3 seconds, then show modal
    setTimeout(() => {
      loading.style.display = 'none';
      modal.style.display = 'grid';
      statusEl.textContent = 'Loading model…';
    }, 3000);

    // Model load status
    assetItem.addEventListener('loaded', () => {
      modelReady = true;
      if (scanningEnabled) statusEl.textContent = 'Find marker…';
    });
    assetItem.addEventListener('error', (e) => {
      console.warn('GLB load error:', e);
      statusEl.textContent = 'Model failed to load ❌';
    });

    function startScanning(){
      modal.style.display = 'none';
      document.body.classList.remove('waiting');
      document.body.classList.add('scanning');
      scanningEnabled = true;
      statusEl.textContent = modelReady ? 'Find marker…' : 'Loading model…';
      // give A-Frame a nudge after UI changes
      window.dispatchEvent(new Event('resize'));
    }

    startARBtn.addEventListener('click', startScanning);
    closeModalBtn.addEventListener('click', startScanning);

    // Marker events
    markerEl.addEventListener('markerFound', () => {
      statusEl.textContent = modelReady ? 'Marker found 🎯' : 'Marker found (loading…)';
    });
    markerEl.addEventListener('markerLost', () => {
      statusEl.textContent = modelReady ? 'Find marker…' : 'Loading model…';
    });

    // Controls
    document.getElementById('pitchUp').addEventListener('click', () => {
      pitch = clamp(pitch + 7.5, -60, 60);
      applyTransform();
    });
    document.getElementById('pitchDown').addEventListener('click', () => {
      pitch = clamp(pitch - 7.5, -60, 60);
      applyTransform();
    });
    document.getElementById('yawL').addEventListener('click', () => {
      yaw -= 15;
      applyTransform();
    });
    document.getElementById('yawR').addEventListener('click', () => {
      yaw += 15;
      applyTransform();
    });
    document.getElementById('scaleDown').addEventListener('click', () => {
      scl = clamp(+((scl - 0.01).toFixed(3)), 0.01, 5);
      applyTransform();
    });
    document.getElementById('scaleUp').addEventListener('click', () => {
      scl = clamp(+((scl + 0.01).toFixed(3)), 0.01, 5);
      applyTransform();
    });
    document.getElementById('reset').addEventListener('click', () => {
      pitch = 0; yaw = 0; scl = base.scale;
      applyTransform();
    });
  </script>
</body>
</html>
