<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>OdotNYC AR</title>

  <!-- A-Frame + AR.js -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.7/aframe/build/aframe-ar.min.js"></script>

  <style>
    :root{
      --glass: rgba(0,0,0,.62);
      --line: rgba(255,255,255,.16);
      --txt: #fff;
      --accent: #9be7ff;

      --pad: max(12px, env(safe-area-inset-left));
      --padR: max(12px, env(safe-area-inset-right));
      --padT: max(12px, env(safe-area-inset-top));
      --padB: max(12px, env(safe-area-inset-bottom));
    }
    html, body { margin:0; height:100%; overflow:hidden; background:#000; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    /* Make the AR canvas truly fill the screen */
    a-scene, canvas { width: 100% !important; height: 100% !important; }

    /* --------- LOADING (logo only) --------- */
    #loading {
      position: fixed; inset: 0;
      display: grid; place-items: center;
      background: radial-gradient(1100px 600px at 50% 25%, rgba(255,255,255,.08), rgba(0,0,0,.96));
      z-index: 10000;
    }
    .logo-only {
      width: min(220px, 62vw);
      aspect-ratio: 1 / 1;
      border-radius: 28px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.03);
      backdrop-filter: blur(10px);
      display: grid; place-items: center;
      overflow: hidden;
      box-shadow: 0 18px 60px rgba(0,0,0,.55);
      animation: pulse 1.35s ease-in-out infinite;
    }
    .logo-only img{
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scale(1.06);
      filter: contrast(1.08) brightness(1.05);
    }
    @keyframes pulse{
      0%,100%{ transform: translateY(0); opacity: .98; }
      50%{ transform: translateY(-2px); opacity: 1; }
    }

    /* --------- INSTRUCTIONS MODAL --------- */
    #modal {
      position: fixed; inset: 0;
      display: none;
      place-items: end center; /* mobile-first: bottom sheet */
      z-index: 9999;
      background: rgba(0,0,0,.50);
      color: var(--txt);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      padding: 0 var(--padR) var(--padB) var(--pad);
    }
    .sheet{
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 14px 14px 12px;
      background: rgba(0,0,0,.72);
      backdrop-filter: blur(12px);
      box-shadow: 0 18px 60px rgba(0,0,0,.55);
      transform: translateY(6px);
      animation: rise .18s ease-out forwards;
    }
    @keyframes rise{ to { transform: translateY(0); } }

    .sheet .handle{
      width: 42px; height: 4px;
      border-radius: 999px;
      background: rgba(255,255,255,.22);
      margin: 2px auto 10px;
    }
    .sheet h2{
      margin: 0 0 8px;
      font-size: 15px;
      letter-spacing: .01em;
      font-weight: 850;
    }
    .sheet p{
      margin: 0;
      font-size: 13px;
      line-height: 1.45;
      opacity: .92;
    }
    .sheet ol{
      margin: 10px 0 0 18px;
      padding: 0;
      font-size: 13px;
      line-height: 1.45;
      opacity: .92;
    }
    .sheet li{ margin: 6px 0; }
    .sheet b{ color: var(--accent); font-weight: 800; }

    .actions{
      margin-top: 12px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }
    .btn{
      width: 100%;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(0,0,0,.55);
      color: var(--txt);
      border-radius: 16px;
      padding: 12px 14px;
      font-size: 14px;
      font-weight: 750;
      backdrop-filter: blur(8px);
      cursor: pointer;
      user-select: none;
    }
    .btn.primary{
      border-color: rgba(155,231,255,.45);
      background: rgba(155,231,255,.14);
    }
    .btn:active{ transform: translateY(1px); }

    /* --------- HUD --------- */
    #hud {
      position: fixed;
      left: var(--pad);
      right: var(--padR);
      top: var(--padT);
      display:flex;
      justify-content:space-between;
      gap:10px;
      z-index: 9998;
      pointer-events:none;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:#fff;
    }
    .pill{
      pointer-events:auto;
      background: rgba(0,0,0,.55);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 999px;
      padding: 8px 12px;
      backdrop-filter: blur(10px);
      font-size: 13px;
      line-height: 1;
      user-select:none;
      max-width: 68vw;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Default: hide HUD until scanning starts */
    body.waiting #hud { display: none; }

    /* Desktop/tablet enhancement */
    @media (min-width: 740px){
      #modal{ place-items: center; padding: 0; }
      .sheet{
        width: min(520px, calc(100% - 28px));
        border-radius: 22px;
        padding: 16px 16px 14px;
      }
      .actions{
        grid-template-columns: 1fr 1fr;
      }
    }

    /* Accessibility: reduce motion */
    @media (prefers-reduced-motion: reduce){
      .logo-only { animation: none; }
      .sheet { animation: none; }
    }
  </style>
</head>

<body class="waiting">

  <!-- LOADING SCREEN (logo only, 3 seconds) -->
  <section id="loading" aria-hidden="true">
    <div class="logo-only">
      <img src="odotnyc3final.png" alt="OdotNYC logo" />
    </div>
  </section>

  <!-- HUD -->
  <div id="hud">
    <div class="pill">📷 OdotNYC AR</div>
    <div class="pill" id="status">Find marker…</div>
  </div>

  <!-- INSTRUCTIONS MODAL -->
  <section id="modal" role="dialog" aria-modal="true">
    <div class="sheet" aria-label="Instructions">
      <div class="handle" aria-hidden="true"></div>
      <h2>Scan Instructions</h2>
      <p>When you start scanning, allow camera access if prompted.</p>
      <ol>
        <li>Point your camera at the <b>OdotNYC marker</b>.</li>
        <li>Keep it <b>flat</b> and <b>well-lit</b>.</li>
        <li>Hold steady for a moment — the <b>3D model</b> will appear.</li>
      </ol>
      <div class="actions">
        <button class="btn" id="closeModal">Not now</button>
        <button class="btn primary" id="startAR">Start scanning</button>
      </div>
    </div>
  </section>

  <!-- A-FRAME SCENE -->
  <a-scene
    embedded
    vr-mode-ui="enabled:false"
    renderer="antialias:true; alpha:true; logarithmicDepthBuffer:true"
    arjs="sourceType:webcam; trackingMethod:best; debugUIEnabled:false;"
  >
    <!-- Light -->
    <a-entity light="type: ambient; intensity: 0.9"></a-entity>
    <a-entity light="type: directional; intensity: 0.6" position="1 2 1"></a-entity>

    <!-- Preload your GLB (still loads during the 3 seconds + after if needed) -->
    <a-assets timeout="45000">
      <a-asset-item id="odotModel" src="office_005.glb"></a-asset-item>
    </a-assets>

    <!-- Marker -->
    <a-marker
      id="marker"
      type="pattern"
      url="odotnyc.patt"
      smooth="true"
      smoothCount="8"
      smoothTolerance="0.01"
      smoothThreshold="2"
    >
      <a-entity
        id="model"
        gltf-model="#odotModel"
        position="0 0 0"
        rotation="0 0 0"
        scale="0.6 0.6 0.6"
      ></a-entity>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    const loading = document.getElementById('loading');
    const modal = document.getElementById('modal');
    const statusEl = document.getElementById('status');

    const startARBtn = document.getElementById('startAR');
    const closeModalBtn = document.getElementById('closeModal');

    const markerEl = document.getElementById('marker');
    const assetItem = document.getElementById('odotModel');

    let modelReady = false;
    let scanningEnabled = false;

    // 1) Logo-only loading screen for exactly 3 seconds
    //    (model can keep loading in the background)
    setTimeout(() => {
      loading.style.display = 'none';
      modal.style.display = 'grid';
      // HUD stays hidden until user starts scanning
      statusEl.textContent = 'Loading model…';
    }, 3000);

    // 2) Track model load status (so we can show helpful status text)
    assetItem.addEventListener('loaded', () => {
      modelReady = true;
      if (scanningEnabled) statusEl.textContent = 'Find marker…';
    });

    assetItem.addEventListener('error', (e) => {
      console.warn('GLB load error:', e);
      statusEl.textContent = 'Model failed to load ❌';
    });

    // 3) Start scanning: close modal, show HUD
    function startScanning(){
      modal.style.display = 'none';
      document.body.classList.remove('waiting');
      scanningEnabled = true;
      statusEl.textContent = modelReady ? 'Find marker…' : 'Loading model…';
    }

    startARBtn.addEventListener('click', startScanning);
    closeModalBtn.addEventListener('click', () => {
      // If user closes, still allow scanning (you can change this behavior)
      startScanning();
    });

    // 4) Marker events update HUD
    markerEl.addEventListener('markerFound', () => {
      statusEl.textContent = modelReady ? 'Marker found 🎯' : 'Marker found (loading…)';
    });
    markerEl.addEventListener('markerLost', () => {
      statusEl.textContent = modelReady ? 'Find marker…' : 'Loading model…';
    });

    // Optional quick fixes if your model is invisible:
    // document.querySelector('#model').setAttribute('rotation', '-90 0 0');
    // document.querySelector('#model').setAttribute('position', '0 0.2 0');
    // document.querySelector('#model').setAttribute('scale', '2 2 2');
  </script>

</body>
</html>
