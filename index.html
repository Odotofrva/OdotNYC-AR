<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>OdotNYC AR BC</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <!-- MindAR (Image Tracking) for A-Frame -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body { margin: 0; height: 100%; width: 100%; overflow: hidden; background: #000; }

    /* Loading overlay */
    #boot {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background: #000;
      z-index: 9999;
    }
    #boot .logo {
      width: min(220px, 60vw);
      height: auto;
      image-rendering: auto;
    }

    /* Optional hint */
    #hint {
      position: fixed;
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      padding: 10px 12px;
      border-radius: 999px;
      background: rgba(0,0,0,0.6);
      color: #fff;
      font: 14px/1.2 system-ui, -apple-system, Segoe UI, Roboto, Arial;
      z-index: 5;
      pointer-events: none;
      opacity: 0;
      transition: opacity .25s ease;
    }
    #hint.show { opacity: 1; }

    /* Prevent iOS “rubber band” weirdness */
    body { overscroll-behavior: none; }
  </style>
</head>

<body>
  <!-- 3-second loading screen -->
  <div id="boot" aria-label="Loading">
    <img class="logo" src="assets/odotnyc3final.png" alt="Logo" />
  </div>

  <div id="hint">Point your camera at the business card marker</div>

  <!-- We keep the scene hidden until after the loading screen -->
  <a-scene
    id="scene"
    style="display:none;"
    embedded
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    renderer="colorManagement: true; physicallyCorrectLights: true;"
  >
    <a-assets>
      <a-asset-item id="glb" src="assets/office_005.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled:false"></a-camera>

    <!-- Target index 0 = first image in targets.mind -->
    <a-entity id="target" mindar-image-target="targetIndex: 0">
      <a-gltf-model
        src="#glb"
        position="0 0 0"
        rotation="0 0 0"
        scale="0.6 0.6 0.6"
      ></a-gltf-model>

      <a-entity light="type: directional; intensity: 0.9" position="0 1 1"></a-entity>
      <a-entity light="type: ambient; intensity: 0.55"></a-entity>
    </a-entity>
  </a-scene>

  <script>
    (function () {
      const boot = document.getElementById("boot");
      const hint = document.getElementById("hint");
      const sceneEl = document.getElementById("scene");

      // After 3 seconds: hide boot, show AR scene, then start MindAR
      window.addEventListener("load", () => {
        setTimeout(async () => {
          boot.remove();
          sceneEl.style.display = "block";
          hint.classList.add("show");

          // Initialize MindAR only after showing the AR view
          // We set the mindar-image component dynamically so camera starts AFTER boot.
          sceneEl.setAttribute("mindar-image", "imageTargetSrc: ./targets.mind; autoStart: true;");

          // Some browsers need a tick before starting
          await new Promise(r => setTimeout(r, 100));

          // Start AR system (safe to call; mindar-image system exists after attribute is set)
          const arSystem = sceneEl.systems["mindar-image-system"];
          if (arSystem && arSystem.start) {
            try { await arSystem.start(); } catch (e) { console.warn("AR start blocked:", e); }
          }

          // Optional: hide hint after a bit
          setTimeout(() => hint.classList.remove("show"), 5000);
        }, 3000);
      });
    })();
  </script>
</body>
</html>
