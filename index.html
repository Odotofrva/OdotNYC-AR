<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover"
  />
  <title>OdotNYC AR</title>

  <!-- A-Frame + AR.js -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.7/aframe/build/aframe-ar.min.js"></script>

  <style>
    :root{
      --glass: rgba(0,0,0,.70);
      --line: rgba(255,255,255,.16);
      --txt: #fff;
      --accent: #9be7ff;

      --safeL: env(safe-area-inset-left);
      --safeR: env(safe-area-inset-right);
      --safeT: env(safe-area-inset-top);
      --safeB: env(safe-area-inset-bottom);

      --padX: max(12px, var(--safeL));
      --padXR: max(12px, var(--safeR));
      --padT: max(12px, var(--safeT));
      --padB: max(12px, var(--safeB));

      /* fallback for older mobile browsers; set via JS */
      --vh: 1vh;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      color: var(--txt);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    /* --- CRITICAL: force A-Frame canvas to be truly full-screen on mobile --- */
    a-scene {
      position: fixed !important;
      inset: 0 !important;
      width: 100vw !important;
      height: 100dvh !important;              /* modern mobile */
      height: calc(var(--vh) * 100) !important; /* fallback */
      display: block !important;
      z-index: 0;
    }
    canvas {
      position: fixed !important;
      inset: 0 !important;
      width: 100vw !important;
      height: 100dvh !important;
      height: calc(var(--vh) * 100) !important;
      display: block !important;
      touch-action: none;
    }

    /* ---------- LOADING (logo only, 3 seconds) ---------- */
    #loading {
      position: fixed;
      inset: 0;
      height: 100dvh;
      height: calc(var(--vh) * 100);
      display: grid;
      place-items: center;
      background: radial-gradient(1100px 600px at 50% 25%, rgba(255,255,255,.08), rgba(0,0,0,.96));
      z-index: 10000;
      padding: var(--padT) var(--padXR) var(--padB) var(--padX);
    }
    .logo-only {
      width: clamp(160px, 58vw, 240px);
      aspect-ratio: 1 / 1;
      border-radius: 28px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.03);
      backdrop-filter: blur(10px);
      display: grid;
      place-items: center;
      overflow: hidden;
      box-shadow: 0 18px 60px rgba(0,0,0,.55);
      animation: pulse 1.35s ease-in-out infinite;
    }
    .logo-only img{
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scale(1.06);
      filter: contrast(1.08) brightness(1.05);
    }
    @keyframes pulse{
      0%,100%{ transform: translateY(0); opacity: .98; }
      50%{ transform: translateY(-2px); opacity: 1; }
    }

    /* ---------- HUD ---------- */
    #hud {
      position: fixed;
      left: var(--padX);
      right: var(--padXR);
      top: var(--padT);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      z-index: 9000;
      pointer-events: none;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }
    .pill{
      pointer-events: auto;
      background: rgba(0,0,0,.55);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 999px;
      padding: 8px 12px;
      backdrop-filter: blur(10px);
      font-size: clamp(12px, 3.5vw, 13px);
      line-height: 1;
      user-select: none;
      max-width: 70vw;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    body.waiting #hud { display: none; }

    /* ---------- INSTRUCTIONS MODAL (mobile bottom sheet) ---------- */
    #modal {
      position: fixed;
      inset: 0;
      height: 100dvh;
      height: calc(var(--vh) * 100);
      display: none;
      place-items: end center;
      z-index: 9500;
      background: rgba(0,0,0,.50);
      padding: 0 var(--padXR) var(--padB) var(--padX);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    .sheet{
      width: 100%;
      max-width: 560px;

      border: 1px solid var(--line);
      border-radius: 22px;
      background: rgba(0,0,0,.72);
      backdrop-filter: blur(12px);
      box-shadow: 0 18px 60px rgba(0,0,0,.55);

      /* responsive height */
      max-height: min(78dvh, calc(var(--vh) * 78));
      overflow: auto;

      padding: 14px 14px 12px;
      transform: translateY(6px);
      animation: rise .18s ease-out forwards;
    }
    @keyframes rise{ to { transform: translateY(0); } }

    .handle{
      width: 42px;
      height: 4px;
      border-radius: 999px;
      background: rgba(255,255,255,.22);
      margin: 2px auto 10px;
    }
    .sheet h2{
      margin: 0 0 8px;
      font-size: clamp(14px, 4.2vw, 16px);
      letter-spacing: .01em;
      font-weight: 850;
    }
    .sheet p{
      margin: 0;
      font-size: clamp(12px, 3.8vw, 13px);
      line-height: 1.45;
      opacity: .92;
    }
    .sheet ol{
      margin: 10px 0 0 18px;
      padding: 0;
      font-size: clamp(12px, 3.8vw, 13px);
      line-height: 1.45;
      opacity: .92;
    }
    .sheet li{ margin: 6px 0; }
    .sheet b{ color: var(--accent); font-weight: 800; }

    .actions{
      margin-top: 12px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }
    .btn{
      width: 100%;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(0,0,0,.55);
      color: var(--txt);
      border-radius: 16px;
      padding: 12px 14px;
      font-size: clamp(13px, 4vw, 14px);
      font-weight: 800;
      backdrop-filter: blur(8px);
      cursor: pointer;
      user-select: none;
    }
    .btn.primary{
      border-color: rgba(155,231,255,.45);
      background: rgba(155,231,255,.14);
    }
    .btn:active{ transform: translateY(1px); }

    /* Tablet/desktop enhancement */
    @media (min-width: 740px){
      #modal{ place-items: center; padding: 0; }
      .sheet{
        width: min(520px, calc(100% - 28px));
        max-height: 70dvh;
        max-height: calc(var(--vh) * 70);
        padding: 16px 16px 14px;
      }
      .actions{
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (prefers-reduced-motion: reduce){
      .logo-only { animation: none; }
      .sheet { animation: none; }
    }
  </style>
</head>

<body class="waiting">

  <!-- Loading screen (logo only) -->
  <section id="loading" aria-hidden="true">
    <div class="logo-only">
      <img src="odotnyc-logo.png" alt="OdotNYC logo" />
    </div>
  </section>

  <!-- HUD -->
  <div id="hud">
    <div class="pill">📷 OdotNYC AR</div>
    <div class="pill" id="status">Find marker…</div>
  </div>

  <!-- Instructions modal -->
  <section id="modal" role="dialog" aria-modal="true">
    <div class="sheet" aria-label="Instructions">
      <div class="handle" aria-hidden="true"></div>
      <h2>Scan Instructions</h2>
      <p>When you start scanning, allow camera access if prompted.</p>
      <ol>
        <li>Point your camera at the <b>OdotNYC marker</b>.</li>
        <li>Keep it <b>flat</b> and <b>well-lit</b>.</li>
        <li>Hold steady — the <b>3D model</b> will appear.</li>
      </ol>
      <div class="actions">
        <button class="btn" id="closeModal">Not now</button>
        <button class="btn primary" id="startAR">Start scanning</button>
      </div>
    </div>
  </section>

  <!-- AR scene -->
  <a-scene
    embedded
    vr-mode-ui="enabled:false"
    renderer="antialias:true; alpha:true; logarithmicDepthBuffer:true"
    arjs="sourceType:webcam; trackingMethod:best; debugUIEnabled:false;"
  >
    <!-- Light -->
    <a-entity light="type: ambient; intensity: 0.9"></a-entity>
    <a-entity light="type: directional; intensity: 0.6" position="1 2 1"></a-entity>

    <!-- Preload GLB -->
    <a-assets timeout="45000">
      <!-- Change this filename if needed -->
      <a-asset-item id="odotModel" src="office_005.glb"></a-asset-item>
    </a-assets>

    <!-- Marker -->
    <a-marker
      id="marker"
      type="pattern"
      url="odotnyc.patt"
      smooth="true"
      smoothCount="8"
      smoothTolerance="0.01"
      smoothThreshold="2"
    >
      <!-- Model: starter transform for bigger scenes -->
      <a-entity
        id="model"
        gltf-model="#odotModel"
        position="0 0.05 0"
        rotation="-90 0 0"
        scale="0.08 0.08 0.08"
      ></a-entity>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    // --- Dynamic viewport height fix (mobile Safari / Android URL bar) ---
    function setVH(){
      const vh = window.innerHeight * 0.01;
      document.documentElement.style.setProperty('--vh', `${vh}px`);
    }
    setVH();
    window.addEventListener('resize', setVH);
    window.addEventListener('orientationchange', () => setTimeout(setVH, 200));

    const loading = document.getElementById('loading');
    const modal = document.getElementById('modal');
    const statusEl = document.getElementById('status');

    const startARBtn = document.getElementById('startAR');
    const closeModalBtn = document.getElementById('closeModal');

    const markerEl = document.getElementById('marker');
    const assetItem = document.getElementById('odotModel');

    let modelReady = false;
    let scanningEnabled = false;

    // 1) Always show logo-only loading for 3 seconds
    setTimeout(() => {
      loading.style.display = 'none';
      modal.style.display = 'grid';
      statusEl.textContent = 'Loading model…';
    }, 3000);

    // 2) Track model load
    assetItem.addEventListener('loaded', () => {
      modelReady = true;
      if (scanningEnabled) statusEl.textContent = 'Find marker…';
    });

    assetItem.addEventListener('error', (e) => {
      console.warn('GLB load error:', e);
      statusEl.textContent = 'Model failed to load ❌';
    });

    // 3) Start scanning: close modal, show HUD
    function startScanning(){
      modal.style.display = 'none';
      document.body.classList.remove('waiting');
      scanningEnabled = true;
      statusEl.textContent = modelReady ? 'Find marker…' : 'Loading model…';
    }

    startARBtn.addEventListener('click', startScanning);
    closeModalBtn.addEventListener('click', startScanning);

    // 4) Marker events update HUD
    markerEl.addEventListener('markerFound', () => {
      statusEl.textContent = modelReady ? 'Marker found 🎯' : 'Marker found (loading…)';
    });
    markerEl.addEventListener('markerLost', () => {
      statusEl.textContent = modelReady ? 'Find marker…' : 'Loading model…';
    });
  </script>

</body>
</html>
