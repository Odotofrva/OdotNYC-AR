<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>OdotNYC AR</title>

  <!-- Prevent weird zoom behaviors on mobile -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <!-- AR.js for A-Frame (marker-based) -->
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>

  <style>
    :root{
      --bg:#000;
      --fg:#fff;
      --muted:rgba(255,255,255,.72);
      --card:rgba(0,0,0,.55);
      --border:rgba(255,255,255,.16);
    }

    html, body { height:100%; width:100%; margin:0; background:var(--bg); color:var(--fg); overflow:hidden; }
    * { box-sizing:border-box; font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; }

    /* Loading screen */
    #loader{
      position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
      background:#000; z-index:9999;
      padding:24px;
    }
    .loader-inner{
      display:flex; flex-direction:column; align-items:center; gap:14px;
    }
    .logo{
      width:min(64vw, 260px);
      height:auto;
      filter: drop-shadow(0 10px 30px rgba(255,255,255,.08));
      image-rendering: -webkit-optimize-contrast;
    }

    /* simple glitch effect */
    .glitch-wrap{
      position:relative;
      display:inline-block;
    }
    .glitch-wrap::before,
    .glitch-wrap::after{
      content:"";
      position:absolute;
      inset:0;
      background:url("odotnyc3final.png") center/contain no-repeat;
      opacity:.6;
      mix-blend-mode: screen;
      pointer-events:none;
      transform: translate(0,0);
      clip-path: inset(0 0 0 0);
      animation: glitch 900ms infinite linear;
    }
    .glitch-wrap::after{
      opacity:.45;
      animation-duration: 1200ms;
      animation-direction: reverse;
    }
    @keyframes glitch{
      0%   { transform: translate(0,0); clip-path: inset(0 0 85% 0); }
      10%  { transform: translate(2px,-1px); clip-path: inset(10% 0 55% 0); }
      20%  { transform: translate(-2px,1px); clip-path: inset(35% 0 35% 0); }
      30%  { transform: translate(3px,0); clip-path: inset(60% 0 15% 0); }
      40%  { transform: translate(-3px,2px); clip-path: inset(5% 0 70% 0); }
      50%  { transform: translate(1px,-2px); clip-path: inset(70% 0 5% 0); }
      60%  { transform: translate(-1px,0); clip-path: inset(25% 0 45% 0); }
      70%  { transform: translate(2px,2px); clip-path: inset(45% 0 25% 0); }
      80%  { transform: translate(-2px,-1px); clip-path: inset(15% 0 60% 0); }
      90%  { transform: translate(1px,1px); clip-path: inset(55% 0 10% 0); }
      100% { transform: translate(0,0); clip-path: inset(0 0 85% 0); }
    }

    /* AR container */
    #app{
      position:fixed; inset:0;
      display:none;
      background:#000;
    }

    /* Instruction overlay */
    .hud{
      position:fixed;
      left:0; right:0; top:0;
      padding: max(14px, env(safe-area-inset-top)) 14px 14px 14px;
      z-index:50;
      display:flex;
      gap:10px;
      align-items:flex-start;
      justify-content:space-between;
      pointer-events:none; /* allow camera gestures */
    }
    .hud-card{
      pointer-events:auto;
      max-width: min(560px, 92vw);
      background: var(--card);
      border:1px solid var(--border);
      backdrop-filter: blur(10px);
      border-radius: 14px;
      padding: 12px 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
    }
    .hud-title{
      font-weight: 700;
      font-size: 14px;
      margin: 0 0 6px 0;
      letter-spacing: .2px;
    }
    .hud-text{
      margin:0;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.35;
    }
    .hud-actions{
      pointer-events:auto;
      display:flex;
      gap:10px;
      align-items:center;
    }
    .btn{
      border:1px solid var(--border);
      background: rgba(255,255,255,.06);
      color: var(--fg);
      padding: 10px 12px;
      border-radius: 12px;
      font-weight: 650;
      font-size: 13px;
      cursor:pointer;
      user-select:none;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active{ transform: translateY(1px); }

    /* bottom hint */
    .bottom-hint{
      position: fixed;
      left: 0; right: 0; bottom: 0;
      padding: 10px 14px max(14px, env(safe-area-inset-bottom)) 14px;
      z-index: 50;
      display:flex;
      justify-content:center;
      pointer-events:none;
    }
    .pill{
      pointer-events:auto;
      background: rgba(0,0,0,.55);
      border:1px solid var(--border);
      backdrop-filter: blur(10px);
      border-radius:999px;
      padding: 10px 14px;
      font-size: 12.5px;
      color: var(--muted);
    }

    /* Make A-Frame canvas fill correctly on mobile */
    a-scene, canvas { position:fixed !important; inset:0 !important; width:100% !important; height:100% !important; }
  </style>
</head>

<body>
  <!-- LOADER (3 seconds) -->
  <div id="loader" aria-label="Loading">
    <div class="loader-inner">
      <div class="glitch-wrap" aria-hidden="true" style="width:min(64vw, 260px);">
        <!-- base logo -->
        <img class="logo" src="assets/odotnyc-logo.png" alt="OdotNYC logo" />
      </div>
    </div>
  </div>

  <!-- APP -->
  <div id="app">
    <div class="hud">
      <div class="hud-card" id="instructions">
        <p class="hud-title">Scan the OdotNYC marker</p>
        <p class="hud-text">
          Point your camera at the printed marker. Hold steady for a second.
          The 3D model will lock on top of it.
        </p>
      </div>

      <div class="hud-actions">
        <button class="btn" id="recenterBtn" type="button">Re-center</button>
        <button class="btn" id="hideBtn" type="button">Hide tips</button>
      </div>
    </div>

    <div class="bottom-hint">
      <div class="pill" id="statusPill">Camera: initializing…</div>
    </div>

    <!-- A-FRAME / AR.JS SCENE -->
    <a-scene
      embedded
      vr-mode-ui="enabled: false"
      renderer="colorManagement:true; physicallyCorrectLights:true; antialias:true; alpha:true"
      arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
    >
      <a-assets>
        <a-asset-item id="modelGLB" src="office_005.glb"></a-asset-item>
      </a-assets>

      <!-- Marker -->
      <a-marker
        id="marker"
        type="pattern"
        url="odotnyc-marker.patt"
      >
        <!-- 3D Model (adjust scale/rotation/position to fit your marker) -->
        <a-entity
          id="model"
          gltf-model="#modelGLB"
          position="0 0 0"
          rotation="0 0 0"
          scale="0.6 0.6 0.6"
        ></a-entity>
      </a-marker>

      <!-- Camera -->
      <a-entity camera></a-entity>
    </a-scene>
  </div>

  <script>
    const loader = document.getElementById("loader");
    const app = document.getElementById("app");
    const statusPill = document.getElementById("statusPill");
    const instructions = document.getElementById("instructions");
    const hideBtn = document.getElementById("hideBtn");
    const recenterBtn = document.getElementById("recenterBtn");
    const marker = document.getElementById("marker");

    // 1) Loader for 3 seconds
    window.addEventListener("load", () => {
      setTimeout(() => {
        loader.style.display = "none";
        app.style.display = "block";

        // Some Android devices need a tiny delay before resize kicks in.
        setTimeout(() => window.dispatchEvent(new Event("resize")), 150);
      }, 3000);
    });

    // 2) Marker detection events
    marker.addEventListener("markerFound", () => {
      statusPill.textContent = "Marker found ✅";
    });
    marker.addEventListener("markerLost", () => {
      statusPill.textContent = "Marker lost… aim at the marker";
    });

    // 3) UI controls
    let tipsVisible = true;
    hideBtn.addEventListener("click", () => {
      tipsVisible = !tipsVisible;
      instructions.style.display = tipsVisible ? "block" : "none";
      hideBtn.textContent = tipsVisible ? "Hide tips" : "Show tips";
    });

    // "Re-center" in marker AR usually means: re-acquire marker.
    // We can quickly show a hint + encourage users to point at marker again.
    recenterBtn.addEventListener("click", () => {
      statusPill.textContent = "Re-center: point at marker again";
      setTimeout(() => {
        statusPill.textContent = "Aim at the marker";
      }, 1200);
    });

    // 4) Update status when camera is ready (best-effort)
    // AR.js doesn’t always expose a perfect event, so we do a gentle fallback.
    setTimeout(() => {
      if (statusPill.textContent.includes("initializing")) {
        statusPill.textContent = "Aim at the marker";
      }
    }, 4500);

    // 5) Keep canvas full-screen on orientation changes
    window.addEventListener("orientationchange", () => {
      setTimeout(() => window.dispatchEvent(new Event("resize")), 200);
    });
  </script>
</body>
</html>
